# Nginx 配置示例
# 将此配置添加到你的 Nginx 配置文件中
#
# ------------------------------------------------------------------
# 重要：若使用「禁止 .lua」规则（return 403），必须同时增加下面一段，
# 否则 --extend-btwaf-cache 无法通过 HTTP 拉取 btwaf-ext/btwaf/lib/*.lua
# （正则 location 会匹配所有 .lua；^~ 前缀匹配优先级更高，可豁免该目录）
#
#   location ^~ /btwaf-ext/ {
#       autoindex on;
#       autoindex_exact_size off;
#       autoindex_localtime on;
#       charset utf-8,gbk;
#   }
#
# 请把该块写在「location ~ \.(php|lua|...)」之前或确保 server 内存在此块。
# ------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name shellstack.910918920801.xyz;

    # 部署目录路径（请根据实际部署路径修改）
    root /var/www/shellstack;
    index shellstack.sh index.html;

    # 日志文件
    access_log /var/log/nginx/shellstack_access.log;
    error_log /var/log/nginx/shellstack_error.log;

    # 主 location
    location / {
        try_files $uri $uri/ =404;
        
        # 允许执行 shell 脚本（通过下载方式）
        add_header Content-Type text/plain;
        add_header Content-Disposition "inline";
    }

    # Shell 脚本文件特殊处理
    location ~ \.sh$ {
        add_header Content-Type text/plain;
        add_header Content-Disposition "inline";
        add_header X-Content-Type-Options "nosniff";
        
        # 允许跨域（如果需要）
        # add_header Access-Control-Allow-Origin "*";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问 Git 目录
    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }
}

